- name: "NEP-kappa"
  logo: "/assets/img/software/logo-kappa.png"
  description: "NEP-kappa is a workflow for lattice thermal conductivity analysis using Neuroevolution Potential (NEP), focusing on efficient force-constant generation, transport post-processing, and reproducible phonon-thermal studies."
  status: "Open source"
  tags:
    - "NEP"
    - "Phonon transport"
    - "Reproducible workflow"
  link: "https://github.com/lyushisyan/NEP-kappa"
  docs: "https://nep-kappa.readthedocs.io"
  paper: "https://doi.org/10.1063/5.0324012"

- name: "PhonoMC"
  mark: "MC"
  mark_label: "Phonon Monte Carlo"
  description: "PhonoMC is a C++ phonon Monte Carlo simulator for semiconductor heat transport. It supports box and mesh geometries, HDF5 material data, rough and periodic boundaries, OpenMP parallelism, and thermal-conductivity estimation."
  status: "Open source"
  tags:
    - "Phonon Monte Carlo"
    - "C++ / OpenMP"
    - "Semiconductor heat transport"
  link: "https://github.com/lyushisyan/PhonoMC"
